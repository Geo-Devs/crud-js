<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crud Alumnos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    
    <div class="container mt-5">
        <h1 class="text-center mb-4">CRUD Alumnos</h1>

        <!-- Formulario Crud -->

        <form action="formalumno" class="card p-4 shadow ">
            <input type="hidden" id="alumnoId" name="alumnoId">
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="nombre" class="form-label">Nombre</label>
                    <input type="text" class="form-control" id="nombre" name="nombre" required>
                </div>

                
                <div class="col-md-6 mb-3">
                    <label for="apellido" class="form-label">Apellido</label>
                    <input type="text" class="form-control" id="apellido" name="apellido" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="telefono" class="form-label">Telefono</label>
                    <input type="text" class="form-control" id="telefono" name="telefono" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label for="direccion" class="form-label">Direccion</label>
                    <input type="text" class="form-control" id="direccion" name="direccion" required>
                </div>

            </div>
            <button type="submit" class="btn btn-outline-primary" id="idguardar">Guardar</button>
            <button type="submit" class="btn btn-outline-success d-none" id="idactualizar">Actualizar</button>
            <button type="submit" class="btn btn-outline-secondary d-none" id="idcancelar">Cancelar</button>
        </form>




        <!-- Tabla de Alumnos -->
        <h3 class="mt-5">Lista de Alumnos</h3>
        <table class="table table-striped mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Telefono</th>
                    <th>Direccion</th>


                </tr>
                
            </thead>
            <tbody id="TablaBody"></tbody> <!-- Aquí se llenarán los datos de los alumnos -->
        </table>
    </div>


    



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="script.js">

        
    </script>
</body>
</html>
